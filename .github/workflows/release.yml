name: Signed Android release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Restore upload keystore
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          test -n "$UPLOAD_KEYSTORE_BASE64"
          printf '%s' "$UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"
      - name: Test, lint, and build signed AAB
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: ./gradlew --no-daemon test lint bundleRelease
      - name: Verify AAB signature
        run: jarsigner -verify -verbose -certs app/build/outputs/bundle/release/app-release.aab
      - name: Create SHA-256 checksum
        run: sha256sum app/build/outputs/bundle/release/app-release.aab > app/build/outputs/bundle/release/app-release.aab.sha256
      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: lifelink-release-${{ github.sha }}
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/bundle/release/app-release.aab.sha256
          if-no-files-found: error
          retention-days: 30
